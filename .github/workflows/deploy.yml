name: Build and Deploy Django Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: mhmarbles/django
  BASE_REPO: mhmarbles/python-base
  APP_DIR: /home/ubuntu/django

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout FULL history
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 2. Detect base image changes
      - name: Check for base image changes
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "BASE_CHANGED=true" >> $GITHUB_ENV
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "Dockerfile.base"; then
            echo "BASE_CHANGED=true" >> $GITHUB_ENV
          else
            echo "BASE_CHANGED=false" >> $GITHUB_ENV
          fi

      # 3. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Build base image ONLY if changed
      - name: Build and Push Base Image
        if: env.BASE_CHANGED == 'true'
        run: |
          BASE_IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BASE_REPO }}:latest

          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile.base \
            -t $BASE_IMAGE_URI \
            --push .

      # 7. Set base image reference
      - name: Set Base Image
        run: |
          BASE_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BASE_REPO }}:latest
          echo "BASE_IMAGE=$BASE_IMAGE" >> $GITHUB_ENV

      # 8. Build & push app image
      - name: Build and Push App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}

      # 9. Deploy via SSM
      - name: Deploy to EC2 via SSM
        run: |
          set -e

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --region $AWS_REGION \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "set -ex",

              "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"${{ secrets.AWS_ACCOUNT_ID }}"'.dkr.ecr.'"$AWS_REGION"'.amazonaws.com",

              "cd '"$APP_DIR"'",

              "docker-compose down --remove-orphans || true",
              "docker system prune -af || true",

              "sed -i '\''/IMAGE_URI/d'\'' .env || true",
              "echo IMAGE_URI='"$IMAGE_URI"' >> .env",

              "docker pull '"$IMAGE_URI"'",

              "docker-compose up -d --force-recreate"
            ]')

          echo "SSM Command ID: $COMMAND_ID"
