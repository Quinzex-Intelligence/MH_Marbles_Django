name: Build and Deploy Django Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: mhmarbles/django
  BASE_REPO: mhmarbles/python-base
  APP_DIR: /home/ubuntu/django

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Detect Dockerfile.base changes
      - name: Check for base image changes
        id: base_check
        run: |
          git fetch origin main
          if git diff --name-only HEAD~1 HEAD | grep -q "Dockerfile.base"; then
            echo "BASE_CHANGED=true" >> $GITHUB_ENV
          else
            echo "BASE_CHANGED=false" >> $GITHUB_ENV
          fi

      # 3. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Get next base version (only if changed)
      - name: Get next base version
        if: env.BASE_CHANGED == 'true'
        id: base_version
        run: |
          EXISTING_TAGS=$(aws ecr list-images \
            --repository-name $BASE_REPO \
            --query 'imageIds[*].imageTag' \
            --output text)

          COUNT=$(echo "$EXISTING_TAGS" | grep -o "base-v[0-9]*" | wc -l)
          NEXT=$((COUNT + 1))

          echo "BASE_TAG=base-v$NEXT" >> $GITHUB_ENV

      # 7. Build & push base image (only if changed)
      - name: Build and Push Base Image
        if: env.BASE_CHANGED == 'true'
        run: |
          BASE_IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${BASE_REPO}:${BASE_TAG}

          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile.base \
            -t $BASE_IMAGE_URI \
            --push .

      # 8. Use latest base tag if no change
      - name: Set default base tag
        if: env.BASE_CHANGED == 'false'
        run: |
          echo "BASE_TAG=latest" >> $GITHUB_ENV

      # 9. Build & push app image
      - name: Build and Push App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BASE_REPO }}:${{ env.BASE_TAG }}

      # 10. Deploy via SSM
      - name: Deploy to EC2 via SSM
        run: |
          set -e

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --region $AWS_REGION \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "set -ex",

              "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"${{ secrets.AWS_ACCOUNT_ID }}"'.dkr.ecr.'"$AWS_REGION"'.amazonaws.com",

              "cd '"$APP_DIR"'",

              "docker-compose down --remove-orphans || true",
              "docker system prune -af || true",

              "sed -i '\''/IMAGE_URI/d'\'' .env || true",
              "echo IMAGE_URI='"$IMAGE_URI"' >> .env",

              "docker pull '"$IMAGE_URI"'",

              "docker-compose up -d --force-recreate"
            ]')

          echo "SSM Command ID: $COMMAND_ID"
